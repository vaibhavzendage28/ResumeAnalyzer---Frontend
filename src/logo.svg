<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#0f172a" stroke="#dc2626" stroke-width="2"/>
  
  <!-- Document Shape -->
  <g transform="translate(50, 40)">
    <!-- Main Document -->
    <rect x="0" y="0" width="100" height="120" rx="8" fill="#1e293b" stroke="#dc2626" stroke-width="2"/>
    
    <!-- Document Lines (representing resume text) -->
    <line x1="12" y1="20" x2="88" y2="20" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="32" x2="88" y2="32" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="44" x2="75" y2="44" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Checkmark Section -->
    <g transform="translate(65, 55)">
      <!-- Checkmark Circle Background -->
      <circle cx="0" cy="0" r="18" fill="#16a34a"/>
      
      <!-- Checkmark -->
      <g stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M -8 0 L -2 6 L 8 -4"/>
      </g>
    </g>
    
    <!-- Analysis Waves (representing AI analysis) -->
    <g transform="translate(12, 80)">
      <path d="M 0 10 Q 5 5 10 10" stroke="#22c55e" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M 15 10 Q 20 5 25 10" stroke="#22c55e" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M 30 10 Q 35 5 40 10" stroke="#22c55e" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Animated sparkle elements -->
  <g>
    <!-- Top right sparkle -->
    <circle cx="155" cy="50" r="3" fill="#dc2626" opacity="0.8">
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="155" cy="50" r="6" fill="none" stroke="#dc2626" stroke-width="1" opacity="0.5">
      <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Bottom left sparkle -->
    <circle cx="45" cy="155" r="2.5" fill="#22c55e" opacity="0.7">
      <animate attributeName="r" values="2.5;4;2.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="45" cy="155" r="5.5" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.4">
      <animate attributeName="r" values="5.5;9;5.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
